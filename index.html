<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Visual Chat (Google GAS版)</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #config { padding: 10px; background: #eee; display: flex; gap: 10px; flex-wrap: wrap; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #chat-box { width: 50%; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #ccc; }
        #messages { flex: 1; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; background: #fff; }
        #visual-box { width: 50%; display: flex; justify-content: center; align-items: center; background: #fafafa; padding: 20px; }
        #image-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #image-container svg { max-width: 100%; max-height: 100%; width: 100%; height: auto; }
        .user-msg { color: blue; text-align: right; margin: 5px 0; font-weight: bold; }
        .ai-msg { color: green; text-align: left; margin: 5px 0; }
        .sys-msg { color: #555; font-size: 0.9em; font-style: italic; }
        input, button { padding: 8px; }
    </style>
</head>
<body>

    <div id="config">
        <input type="password" id="api-key" placeholder="Gemini APIキーを入力" style="width: 200px;">
        <input type="text" id="base-prompt" placeholder="初期ビジュアル（例: 近未来の都市）" value="近未来の都市" style="width: 200px;">
        <button onclick="initApp()">アプリ起動</button>
    </div>

    <div id="main">
        <div id="chat-box">
            <div id="messages"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="user-input" placeholder="メッセージを入力..." style="flex:1;" disabled>
                <button id="send-btn" onclick="sendMessage()" disabled>送信</button>
            </div>
        </div>
        <div id="visual-box">
            <div id="image-container">ここにビジュアルが表示されます</div>
        </div>
    </div>

    <script>
        // 🚀 あなたが生成したGASのウェブアプリURLを埋め込み済みです
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzoNCqxOzrsozdBbJCZYT6_Ld_XUxuGfZ7oF4YP4HH28z2kUgW6pm1e2owKtFeZ_wG6/exec";

        let chatHistory = [];

        const systemPrompt = `
        あなたはユーザーの指示に合わせて、会話と「右側の画面に表示するSVGイラスト」を同時に生成するAIです。
        返答は必ず以下のJSONフォーマットのみで出力してください。他の挨拶や解説テキストは絶対に含めないでください。
        
        {
          "reply": "ユーザーへの返答テキストメッセージ（日本語）",
          "svg": "<svg viewBox='0 0 500 500' xmlns='http://w3.org'>...会話の状況に合わせたオシャレでシンプルなSVGコード。必ず閉じること...</svg>"
        }
        `;

        async function initApp() {
            const apiKey = document.getElementById('api-key').value;
            const basePrompt = document.getElementById('base-prompt').value;
            if(!apiKey) return alert('Gemini APIキーを入力してください');

            document.getElementById('user-input').disabled = false;
            document.getElementById('send-btn').disabled = false;

            addMessage('system', '初期ビジュアルを生成中（これには10秒ほどかかります）...');
            await callAI(`設定された初期ビジュアル「${basePrompt}」を作成し、最初の挨拶をしてください。`);
        }

        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const text = inputEl.value.trim();
            if(!text) return;

            inputEl.value = '';
            addMessage('user', text);

            await callAI(text);
        }

        async function callAI(userText) {
            const apiKey = document.getElementById('api-key').value;
            
            // 履歴に追加
            chatHistory.push({ role: "user", parts: [{ text: userText }] });

            // Gemini APIの要求するデータ構造を作成
            const geminiPayload = {
                systemInstruction: { parts: [{ text: systemPrompt }] },
                contents: chatHistory,
                generationConfig: {
                    responseMimeType: "application/json" // JSON出力を強制
                }
            };

            try {
                // 学校のPCからはGASのURLに向けて通信する（Cisco DoHはスルーする）
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        apiKey: apiKey,
                        payload: geminiPayload
                    })
                });

                const data = await response.json();
                
                // Geminiのレスポンスからテキストを抽出してJSONとしてパース
                const rawJsonText = data.candidates.content.parts[0].text;
                const resObj = JSON.parse(rawJsonText);

                // チャット履歴にAIの返答を追加
                chatHistory.push({ role: "model", parts: [{ text: rawJsonText }] });

                // 画面を更新
                addMessage('ai', resObj.reply);
                document.getElementById('image-container').innerHTML = resObj.svg;

            } catch (error) {
                console.error(error);
                addMessage('system', 'エラーが発生しました。APIキー、GASのURL、またはプロンプトを見直してください。');
            }
        }

        function addMessage(sender, text) {
            const msgDiv = document.getElementById('messages');
            const p = document.createElement('p');
            if (sender === 'user') p.className = 'user-msg';
            else if (sender === 'ai') p.className = 'ai-msg';
            else p.className = 'sys-msg';
            
            p.innerText = sender === 'user' ? `あなた: ${text}` : sender === 'ai' ? `AI: ${text}` : text;
            msgDiv.appendChild(p);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }
    </script>
</body>
</html>
